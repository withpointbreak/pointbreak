name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish crate and GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ github.ref_name }}
          fetch-depth: 0
          fetch-tags: true

      - name: Verify annotated release tag
        id: meta
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]] \
            || { echo "unsupported tag: $TAG" >&2; exit 1; }
          git fetch --force --tags origin
          test "$(git cat-file -t "refs/tags/${TAG}")" = tag
          release_commit=$(git rev-parse "refs/tags/${TAG}^{}")
          test "$(git rev-parse HEAD)" = "$release_commit"
          test -z "$(git status --porcelain --untracked-files=all)"
          version="${TAG#v}"
          crate_version=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "pointbreak") | .version')
          test "$version" = "$crate_version"
          {
            echo "tag=$TAG"
            echo "version=$version"
            echo "commit=$release_commit"
          } >> "$GITHUB_OUTPUT"

      - name: Reject pre-existing published state
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          ! curl -fsS "https://crates.io/api/v1/crates/pointbreak/${VERSION}" >/dev/null 2>&1 \
            || { echo "pointbreak ${VERSION} is already published" >&2; exit 1; }
          ! gh release view "$TAG" >/dev/null 2>&1 \
            || { echo "GitHub release already exists: $TAG" >&2; exit 1; }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@just

      - name: Verify package and archive contract
        run: just package-archive-selftest

      - name: Set up Node (app.js verify)
        uses: actions/setup-node@v6
        with:
          node-version-file: src/cli/inspect/web/.nvmrc
          cache: npm
          cache-dependency-path: src/cli/inspect/web/package-lock.json

      - name: Verify committed app.js matches a fresh build
        working-directory: src/cli/inspect/web
        run: |
          set -euo pipefail
          npm ci
          npm run build -- --outfile="$RUNNER_TEMP/app.js"
          cmp "$RUNNER_TEMP/app.js" ../assets/app.js \
            || { echo "::error::Release blocked — committed assets/app.js is stale vs a fresh build (run 'just web-build' and commit)."; exit 1; }

      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 5); do
            if cargo publish -p pointbreak --locked; then
              exit 0
            fi
            # The preflight proved this version did not exist before our first attempt.
            # If it appears after an ambiguous publish response, the immutable bytes are ours.
            if curl -fsS "https://crates.io/api/v1/crates/pointbreak/${VERSION}" >/dev/null 2>&1; then
              echo "pointbreak ${VERSION} became visible after publish attempt ${attempt}"
              exit 0
            fi
            if [ "$attempt" -lt 5 ]; then
              echo "Publish attempt ${attempt}/5 failed; retrying after propagation delay"
              sleep 30
            fi
          done
          echo "error: failed to publish pointbreak ${VERSION}" >&2
          exit 1

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: pointbreak ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
