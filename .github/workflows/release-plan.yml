name: Release Plan

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Plan (preview only) or release (execute signed bump)"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - release
      version:
        description: "Exact version to release (for example 0.8.0)"
        required: true
        type: string
      expected_source_commit:
        description: "Full reviewed origin/main commit permitted as the release parent"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-plan
  cancel-in-progress: false

jobs:
  plan:
    name: Release Plan
    if: inputs.mode == 'plan'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout reviewed main
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          fetch-tags: true

      - name: Verify expected source commit
        env:
          EXPECTED_SOURCE_COMMIT: ${{ inputs.expected_source_commit }}
        run: |
          set -euo pipefail
          [[ "$EXPECTED_SOURCE_COMMIT" =~ ^[0-9a-f]{40}$ ]] \
            || { echo "expected_source_commit must be full lowercase 40-hex" >&2; exit 1; }
          git fetch --force --tags origin main
          test -z "$(git status --porcelain --untracked-files=all)"
          test "$(git rev-parse HEAD)" = "$EXPECTED_SOURCE_COMMIT"
          test "$(git rev-parse origin/main)" = "$EXPECTED_SOURCE_COMMIT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@just

      - name: Verify package and archive contract
        run: just package-archive-selftest

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install tools
        run: cargo binstall --no-confirm cocogitto@6.5.0 cargo-edit

      - name: Verify release bump hooks
        run: just release-bump-selftest

      - name: Generate release plan
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
          EXPECTED_SOURCE_COMMIT: ${{ inputs.expected_source_commit }}
        run: |
          set -euo pipefail

          PLAN_FILE="${RUNNER_TEMP}/release-plan.md"
          out() { tee -a "$PLAN_FILE" >> "$GITHUB_STEP_SUMMARY"; }
          NEXT_VERSION="${INPUT_VERSION#v}"
          [[ "$NEXT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]] \
            || { echo "unsupported release version: $INPUT_VERSION" >&2; exit 1; }
          TAG="v${NEXT_VERSION}"
          HEAD_SHA=$(git rev-parse HEAD)
          HEAD_SHORT=$(git rev-parse --short HEAD)
          CURRENT_VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "pointbreak") | .version')
          LATEST_TAG=$(git describe --tags --match "v[0-9]*" --abbrev=0 2>/dev/null || true)
          RELEASE_COG_CONFIG="${RUNNER_TEMP}/cog-release.toml"
          cp cog.toml "$RELEASE_COG_CONFIG"
          perl -0pi -e 's/^scopes = \[\]/scopes = ["cli", "review"]/m' "$RELEASE_COG_CONFIG"

          tag_conflict=false
          crate_conflict=false
          release_conflict=false
          git show-ref --verify --quiet "refs/tags/${TAG}" && tag_conflict=true
          crate_status=$(curl --silent --show-error \
            --user-agent 'pointbreak-release-workflow/1.0 (https://github.com/withpointbreak/pointbreak)' \
            --output /dev/null --write-out '%{http_code}' \
            "https://crates.io/api/v1/crates/pointbreak/${NEXT_VERSION}") \
            || { echo "crates.io probe failed" >&2; exit 1; }
          case "$crate_status" in
            200) crate_conflict=true ;;
            404) ;;
            *) echo "unexpected crates.io status: $crate_status" >&2; exit 1 ;;
          esac
          release_status=$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}") \
            || { echo "GitHub release probe failed" >&2; exit 1; }
          case "$release_status" in
            200) release_conflict=true ;;
            404) ;;
            *) echo "unexpected GitHub release status: $release_status" >&2; exit 1 ;;
          esac

          {
            echo "# Release Plan"
            echo ""
            echo "## Exact source boundary"
            echo ""
            echo "**Expected source commit:** \`${EXPECTED_SOURCE_COMMIT}\`"
            echo ""
            echo "**Current origin/main:** \`${HEAD_SHA}\`"
            echo ""
            echo "**Commit:** [\`${HEAD_SHORT}\`](https://github.com/${GITHUB_REPOSITORY}/commit/${HEAD_SHA})"
            echo ""
            echo "## Target"
            echo ""
            echo "**Current crate version:** ${CURRENT_VERSION}"
            echo ""
            echo "**Target version:** ${NEXT_VERSION}"
            echo ""
            echo "**Intended annotated tag:** \`${TAG}\`"
            echo ""
            echo "**Latest existing tag:** ${LATEST_TAG:-none}"
            echo ""
            echo "## Existing-state conflicts"
            echo ""
            echo "- Existing tag conflict: **${tag_conflict}**"
            echo "- Existing crate conflict: **${crate_conflict}**"
            echo "- Existing GitHub release conflict: **${release_conflict}**"
            echo ""
            echo "## Intended release assets"
            echo ""
          } | out

          # jq expands $version.
          # shellcheck disable=SC2016
          jq -r --arg version "$NEXT_VERSION" \
            '.[] | "- `pointbreak-\($version)-\(.target).\(.archive)`"' \
            .github/binary-targets.json | out
          echo "- \`checksums.txt\`" | out

          {
            echo ""
            echo "## CI workflows at the expected parent"
            echo ""
            echo "| Workflow | Status | Commit |"
            echo "| --- | --- | --- |"
          } | out
          # jq expands its own fields.
          # shellcheck disable=SC2016
          gh run list --limit 100 --json name,conclusion,createdAt,headSha,status \
            | jq -r --arg expected "$EXPECTED_SOURCE_COMMIT" \
              '[.[] | select(.headSha == $expected)] | [group_by(.name)[] | sort_by(.createdAt) | last] | sort_by(.name)[] | "| \(.name) | \(if .conclusion != "" and .conclusion != null then .conclusion else .status end) | `\(.headSha[0:7])` |"' \
            | out

          changelog=$(cog --config "$RELEASE_COG_CONFIG" changelog \
            "${LATEST_TAG:+${LATEST_TAG}..HEAD}" 2>&1 || echo "(changelog generation failed)")
          {
            echo ""
            echo "<details>"
            echo "<summary>Changelog preview</summary>"
            echo ""
            echo "$changelog"
            echo ""
            echo "</details>"
            echo ""
            echo "## Next step"
            echo ""
            if $tag_conflict || $crate_conflict || $release_conflict; then
              echo "**BLOCKED:** resolve the reported immutable-state conflict; do not run release mode."
            else
              echo "After explicit owner authorization, rerun with mode \`release\`, version \`${NEXT_VERSION}\`, and the same expected source commit."
              echo "Release mode will run \`cog bump --version ${NEXT_VERSION} --hook-profile ci\`."
            fi
          } | out

      - name: Upload release plan
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-plan
          path: ${{ runner.temp }}/release-plan.md
          retention-days: 90

  release:
    name: Execute Release
    if: inputs.mode == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Generate release push token
        id: release-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Checkout reviewed main
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          fetch-tags: true
          token: ${{ steps.release-token.outputs.token }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@just

      - name: Verify package and archive contract
        run: just package-archive-selftest

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install tools
        run: cargo binstall --no-confirm cocogitto@6.5.0 cargo-edit

      - name: Verify release bump hooks
        run: just release-bump-selftest

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_config_global: true
          git_tag_gpgsign: true
          git_committer_name: "Kevin Swiber"
          git_committer_email: "kswiber@gmail.com"

      - name: Execute exact-parent release bump
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
          EXPECTED_SOURCE_COMMIT: ${{ inputs.expected_source_commit }}
        run: |
          set -euo pipefail

          PLAN_FILE="${RUNNER_TEMP}/release-plan.md"
          TARGET_VERSION="${INPUT_VERSION#v}"
          TAG="v${TARGET_VERSION}"
          [[ "$EXPECTED_SOURCE_COMMIT" =~ ^[0-9a-f]{40}$ ]] \
            || { echo "expected_source_commit must be full lowercase 40-hex" >&2; exit 1; }
          [[ "$TARGET_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]] \
            || { echo "unsupported release version: $INPUT_VERSION" >&2; exit 1; }

          # This is deliberately repeated immediately before the first mutation.
          git fetch --force --tags origin main
          test -z "$(git status --porcelain --untracked-files=all)"
          test "$(git rev-parse HEAD)" = "$EXPECTED_SOURCE_COMMIT"
          test "$(git rev-parse origin/main)" = "$EXPECTED_SOURCE_COMMIT"
          ! git show-ref --verify --quiet "refs/tags/${TAG}" \
            || { echo "Existing tag conflict: $TAG" >&2; exit 1; }
          crate_status=$(curl --silent --show-error \
            --user-agent 'pointbreak-release-workflow/1.0 (https://github.com/withpointbreak/pointbreak)' \
            --output /dev/null --write-out '%{http_code}' \
            "https://crates.io/api/v1/crates/pointbreak/${TARGET_VERSION}") \
            || { echo "crates.io probe failed" >&2; exit 1; }
          case "$crate_status" in
            200) echo "Existing crate conflict: pointbreak $TARGET_VERSION" >&2; exit 1 ;;
            404) ;;
            *) echo "unexpected crates.io status: $crate_status" >&2; exit 1 ;;
          esac
          release_status=$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}") \
            || { echo "GitHub release probe failed" >&2; exit 1; }
          case "$release_status" in
            200) echo "Existing GitHub release conflict: $TAG" >&2; exit 1 ;;
            404) ;;
            *) echo "unexpected GitHub release status: $release_status" >&2; exit 1 ;;
          esac

          RELEASE_COG_CONFIG="${RUNNER_TEMP}/cog-release.toml"
          cp cog.toml "$RELEASE_COG_CONFIG"
          perl -0pi -e 's/^scopes = \[\]/scopes = ["cli", "review"]/m' "$RELEASE_COG_CONFIG"
          cog --config "$RELEASE_COG_CONFIG" bump \
            --version "$TARGET_VERSION" --hook-profile ci

          RELEASE_COMMIT=$(git rev-parse HEAD)
          RELEASE_PARENT=$(git rev-parse HEAD^)
          TAG_TYPE=$(git cat-file -t "refs/tags/${TAG}")
          TAG_COMMIT=$(git rev-parse "refs/tags/${TAG}^{}")
          test "$RELEASE_PARENT" = "$EXPECTED_SOURCE_COMMIT"
          test "$TAG_TYPE" = tag
          test "$TAG_COMMIT" = "$RELEASE_COMMIT"

          {
            echo "# Release Bump Complete"
            echo ""
            echo "**Expected source parent:** \`${EXPECTED_SOURCE_COMMIT}\`"
            echo ""
            echo "**Release commit:** \`${RELEASE_COMMIT}\`"
            echo ""
            echo "**Annotated tag:** \`${TAG}\` (peels to the release commit)"
            echo ""
            echo "The tag push dispatches the immutable crate/release and binary workflows."
          } | tee "$PLAN_FILE" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-plan
          path: ${{ runner.temp }}/release-plan.md
          retention-days: 90
