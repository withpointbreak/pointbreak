name: Release Binaries

# Builds and publishes prebuilt shore binaries for all supported targets.
# The target matrix lives in .github/binary-targets.json (single source of truth,
# also consumed by downstream packaging workflows).
#
# workflow_dispatch has two modes. An existing tag is a real release: every job
# checks out that tag, verifies its crate version, and publishes non-draft assets.
# Dispatching an existing tag deliberately rebuilds and overwrites that release's
# assets. A missing tag is test mode: it builds the default branch into a draft
# release, skips the version guard, and never creates a tag. Never push a
# prerelease tag to test this workflow: any pushed v* tag also triggers
# release.yml, which publishes the crate version to crates.io.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build; existing tags publish assets, missing tags create a draft without creating a tag"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-binaries-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.load.outputs.targets }}
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      mode: ${{ steps.mode.outputs.mode }}
    steps:
      - name: Check out default branch for mode detection
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
      - id: meta
        env:
          RAW_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
        run: |
          if ! printf '%s' "$RAW_TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "unsupported tag: $RAW_TAG" >&2
            exit 1
          fi
          echo "tag=$RAW_TAG" >> "$GITHUB_OUTPUT"
          echo "version=${RAW_TAG#v}" >> "$GITHUB_OUTPUT"
      - name: Resolve release mode
        id: mode
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if git ls-remote --exit-code origin "refs/tags/$TAG" > /dev/null; then
            echo "mode=real" >> "$GITHUB_OUTPUT"
          else
            status=$?
            if [ "$status" -ne 2 ]; then
              echo "failed to check whether refs/tags/$TAG exists on origin" >&2
              exit "$status"
            fi
            echo "mode=test" >> "$GITHUB_OUTPUT"
          fi
      - name: Check out release tag
        if: steps.mode.outputs.mode == 'real'
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ steps.meta.outputs.tag }}
      - id: load
        run: echo "targets=$(jq -c . .github/binary-targets.json)" >> "$GITHUB_OUTPUT"
      - name: Verify tag matches crate version
        if: steps.mode.outputs.mode == 'real'
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          crate_version="$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "pointbreak") | .version')"
          if [ "$VERSION" != "$crate_version" ]; then
            echo "tag version $VERSION does not match crate version $crate_version" >&2
            exit 1
          fi

  build:
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.targets) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.mode == 'real' && format('refs/tags/{0}', needs.prepare.outputs.tag) || github.event.repository.default_branch }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          # GitHub-hosted macOS images have shipped rustup state that collides
          # with cached ~/.cargo/bin contents, leaving `cargo` as rustup-init.
          # See Swatinem/rust-cache#341, actions/runner-images#14099.
          cache-bin: false
      - name: Install cargo-zigbuild
        if: matrix.builder == 'zigbuild'
        run: pip3 install cargo-zigbuild
      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.builder }}" = "zigbuild" ]; then
            cargo zigbuild --release --target "${{ matrix.rust-target }}" --locked
          else
            cargo build --release --target "${{ matrix.rust-target }}" --locked
          fi
      - name: Package
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          scripts/package-release-archive.sh \
            "${{ matrix.target }}" \
            "$VERSION" \
            "${{ matrix.archive }}" \
            "target/${{ matrix.rust-target }}/release"
      - uses: actions/upload-artifact@v7
        with:
          name: bin-${{ matrix.target }}
          path: pointbreak-*
          if-no-files-found: error
          retention-days: 7

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.mode == 'real' && format('refs/tags/{0}', needs.prepare.outputs.tag) || github.event.repository.default_branch }}
      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: bin-*
          merge-multiple: true
      - name: Checksums
        working-directory: dist
        run: |
          shopt -s nullglob
          archives=(pointbreak-*.tar.gz pointbreak-*.zip)
          if [ "${#archives[@]}" -ne 8 ]; then
            echo "expected 8 archives, found ${#archives[@]}" >&2
            exit 1
          fi
          sha256sum "${archives[@]}" > checksums.txt
          sha256sum -c checksums.txt
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          draft: ${{ needs.prepare.outputs.mode == 'test' }}
          prerelease: ${{ contains(needs.prepare.outputs.tag, '-') }}
          files: |
            dist/pointbreak-*
            dist/checksums.txt
          fail_on_unmatched_files: true
          overwrite_files: true
