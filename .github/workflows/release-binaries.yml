name: Release Binaries

# Real assets are produced only by an immutable annotated-tag push. Preview and
# contract testing live in package-release-selftest.sh; existing tags/assets are
# never rebuilt or overwritten by a manual dispatch.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-binaries-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.load.outputs.targets }}
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      commit: ${{ steps.meta.outputs.commit }}
    steps:
      - name: Checkout annotated release tag
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ github.ref_name }}
          fetch-depth: 0
          fetch-tags: true

      - name: Verify clean exact tag checkout
        id: meta
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]] \
            || { echo "unsupported tag: $TAG" >&2; exit 1; }
          git fetch --force --tags origin
          test "$(git cat-file -t "refs/tags/${TAG}")" = tag
          release_commit=$(git rev-parse "refs/tags/${TAG}^{}")
          test "$(git rev-parse HEAD)" = "$release_commit"
          test "$(git describe --tags --always --dirty)" = "$TAG"
          test -z "$(git status --porcelain --untracked-files=all)"
          version="${TAG#v}"
          crate_version=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "pointbreak") | .version')
          test "$version" = "$crate_version"
          {
            echo "tag=$TAG"
            echo "version=$version"
            echo "commit=$release_commit"
          } >> "$GITHUB_OUTPUT"

      - id: load
        run: echo "targets=$(jq -c . .github/binary-targets.json)" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.targets) }}
    steps:
      - name: Checkout annotated release tag
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ needs.prepare.outputs.tag }}
          fetch-depth: 0
          fetch-tags: true

      - name: Verify clean exact tag checkout
        shell: bash
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_COMMIT: ${{ needs.prepare.outputs.commit }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin
          test "$(git cat-file -t "refs/tags/${TAG}")" = tag
          test "$(git rev-parse "refs/tags/${TAG}^{}")" = "$RELEASE_COMMIT"
          test "$(git rev-parse HEAD)" = "$RELEASE_COMMIT"
          test "$(git describe --tags --always --dirty)" = "$TAG"
          test -z "$(git status --porcelain --untracked-files=all)"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          cache-bin: false

      - name: Install cargo-zigbuild
        if: matrix.builder == 'zigbuild'
        run: pip3 install cargo-zigbuild

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.builder }}" = "zigbuild" ]; then
            cargo zigbuild --release --bin pointbreak --target "${{ matrix.rust-target }}" --locked
          else
            cargo build --release --bin pointbreak --target "${{ matrix.rust-target }}" --locked
          fi

      - name: Verify native build identity or record contract-only row
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_COMMIT: ${{ needs.prepare.outputs.commit }}
          TARGET: ${{ matrix.target }}
          EXECUTABLE: ${{ matrix.executable }}
        run: |
          set -euo pipefail
          binary="target/${{ matrix.rust-target }}/release/${EXECUTABLE}"
          native=false
          case "${RUNNER_OS}/${RUNNER_ARCH}/${TARGET}" in
            macOS/X64/darwin-x64 | macOS/ARM64/darwin-arm64 | Linux/X64/linux-x64 | Windows/X64/win32-x64)
              native=true
              ;;
          esac
          if $native; then
            scripts/assert-release-identity.sh \
              "$binary" "$VERSION" "$TAG" "$RELEASE_COMMIT" >"identity-${TARGET}.json"
          else
            jq -n \
              --arg target "$TARGET" \
              --arg tag "$TAG" \
              --arg commit "$RELEASE_COMMIT" \
              '{status:"contract-only", target:$target, tag:$tag, commit:$commit, reason:"cross-compiled binary is not runnable on this hosted runner"}' \
              >"identity-${TARGET}.json"
          fi

      - name: Package
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          scripts/package-release-archive.sh \
            "${{ matrix.target }}" \
            "$VERSION" \
            "target/${{ matrix.rust-target }}/release"

      - uses: actions/upload-artifact@v7
        with:
          name: bin-${{ matrix.target }}
          path: |
            pointbreak-*
            identity-${{ matrix.target }}.json
          if-no-files-found: error
          retention-days: 7

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout annotated release tag
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ needs.prepare.outputs.tag }}
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: bin-*
          merge-multiple: true

      - name: Verify archives and write checksums
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: scripts/verify-release-archives.sh "$VERSION" dist --write-checksums

      - name: Wait for immutable GitHub release and reject asset collisions
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            gh release view "$TAG" >/dev/null 2>&1 && break
            [ "$attempt" -lt 30 ] || { echo "GitHub release was not created for $TAG" >&2; exit 1; }
            sleep 10
          done
          existing=$(gh release view "$TAG" --json assets --jq '.assets[].name')
          while IFS= read -r expected; do
            [ -z "$expected" ] && continue
            ! grep -Fxq "$expected" <<<"$existing" \
              || { echo "release asset already exists: $expected" >&2; exit 1; }
          done < <(
            jq -r --arg version "$VERSION" '.[] | "pointbreak-\($version)-\(.target).\(.archive)"' \
              .github/binary-targets.json
            echo checksums.txt
          )

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          prerelease: ${{ contains(needs.prepare.outputs.tag, '-') }}
          files: |
            dist/pointbreak-*
            dist/checksums.txt
          fail_on_unmatched_files: true
          overwrite_files: false
