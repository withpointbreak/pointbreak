name: windows ci measure

# Dispatch-only measurement harness for the Windows test leg.
# This workflow NEVER runs on push or pull_request — it only exists so the wall-time
# levers can be measured on the real runner image and reverted. Each instrument is
# behind its own boolean input and is meant to be dispatched ONE AT A TIME: the
# Defender step changes the runner's security posture for the rest of the job, so
# enabling it alongside another instrument would skew that instrument's wall.
on:
  workflow_dispatch:
    inputs:
      sys_user:
        description: "Run the sys:user split (bash time)"
        type: boolean
        default: true
      git_latency:
        description: "Run the git per-spawn latency loop (native CreateProcess)"
        type: boolean
        default: false
      defender_toggle:
        description: "Re-enable Defender for one run to measure headroom (reverts)"
        type: boolean
        default: false
      shard_probe:
        description: "Run the 3-shard rust-cache-warmth probe"
        type: boolean
        default: false
      quiet_log:
        description: "Compare chatty vs quiet test-ci log output on one runner"
        type: boolean
        default: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  measure:
    name: measure (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: taiki-e/install-action@just
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2

      # --- sys:user split -------------------------------------------------------
      # The suite is parallel (CPU >> wall), so a high sys:user ratio is the
      # spawn-bound signal. `time` writes real/user/sys (including children) to
      # stderr; read those off the run log. This run's `real` is also the
      # pre-change Windows wall baseline.
      - name: (measure) sys:user split
        if: ${{ inputs.sys_user }}
        shell: bash
        run: |
          time just test-ci

      # --- Defender headroom ----------------------------------------------------
      # Restore the unmitigated posture (real-time monitoring on, drive exclusions
      # removed) to MEASURE how much Defender costs on this suite. The runner VM is
      # ephemeral, so nothing persists past this job; this never adds an exclusion.
      - name: (measure) re-enable Defender (reverts at job end)
        if: ${{ inputs.defender_toggle }}
        shell: pwsh
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $false
          Remove-MpPreference -ExclusionPath "C:\" -ErrorAction SilentlyContinue
          Remove-MpPreference -ExclusionPath "D:\" -ErrorAction SilentlyContinue
      - name: (measure) suite with Defender on
        if: ${{ inputs.defender_toggle }}
        shell: bash
        run: |
          time just test-ci

      # --- git per-spawn latency ------------------------------------------------
      # The git spawn COUNT is OS-independent (taken from the local measurement), so
      # only the Windows per-spawn LATENCY is measured here. A PATH shim cannot count
      # native spawns on Windows anyway — Rust's Command::new("git") resolves git.exe
      # via CreateProcess, which appends only `.exe` and never finds a `.cmd`/extension-
      # less shim — so this times git the way the product spawns it: a native
      # CreateProcess of git.exe in a tight loop. Multiply this against the local count
      # to size the git-spawn share of wall (the deferred gix question).
      - name: (measure) git per-spawn latency
        if: ${{ inputs.git_latency }}
        shell: pwsh
        run: |
          $git = (Get-Command git).Source
          $n = 200
          $sw = [System.Diagnostics.Stopwatch]::StartNew()
          for ($i = 0; $i -lt $n; $i++) { & $git rev-parse HEAD | Out-Null }
          $sw.Stop()
          $total = $sw.Elapsed.TotalMilliseconds
          "$n x git rev-parse HEAD: $([math]::Round($total)) ms total (per-spawn ~ $([math]::Round($total / $n, 2)) ms)"

      # --- log-output cost ------------------------------------------------------
      # Does the chatty CI log (status-level=pass + final-status-level=all + forced
      # color → ~3500 ANSI lines on Windows) add wall? Run the suite twice on the SAME
      # runner to control for the large run-to-run variance: first chatty (the ci
      # profile as shipped), then quiet (only failures, no color). The second run reuses
      # the first's compiled binaries, so compare the two nextest run-phase `Summary
      # [Ns]` lines (both warm, compile excluded) — the delta is the log-output cost.
      - name: (measure) log-output cost (chatty vs quiet, same runner)
        if: ${{ inputs.quiet_log }}
        shell: bash
        run: |
          echo "=== chatty: ci profile as shipped (status-level=pass, final=all, color always) ==="
          time just test-ci
          echo "=== quiet: only failures, no color ==="
          time env CARGO_TERM_COLOR=never just test-ci --status-level fail --final-status-level fail

  probe:
    name: shard probe ${{ matrix.shard }}/3
    if: ${{ inputs.shard_probe }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@just
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
        # A/B: shared-key now ACTIVE. All 3 shards restore ONE cache entry (they compile
        # the identical test-binary set), instead of N distinct per-leg caches that fight
        # the 10GB cap. Dispatch twice: the first run seeds the shared entry (cold), the
        # second restores it (warm). Compare cache hit/miss + compile time against the
        # earlier default-per-leg probe run (which was cold per-shard).
        with:
          shared-key: windows-shards
      - name: compile-only timing
        shell: bash
        run: time cargo nextest run --profile ci --no-run
      - name: partitioned run timing
        shell: bash
        run: time just test-ci --partition slice:${{ matrix.shard }}/3
