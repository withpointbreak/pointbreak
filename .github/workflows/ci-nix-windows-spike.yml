name: CI (Nix Windows cross — spike)

# EXPERIMENTAL spike. Cross-compiles the test suite to Windows msvc on Linux via Nix
# (cargo-xwin + a Fenix msvc std), then executes the prebuilt cargo-nextest archive on a
# plain windows-latest runner with no Rust build step for the suite — only cargo-nextest
# and a source checkout for fixtures. This proves the "build on Linux, run on Windows" pipe
# and moves Windows *compilation* of the suite off the expensive Windows runner. (It does
# not remove the documented long pole: the tests still execute on Windows and spawn git.)
#
# The suite resolves the test binary, fixtures, and cargo at runtime (tests/support/env.rs
# + test_fixtures::manifest_dir), so cargo-nextest's --workspace-remap relocates them onto
# the target. Cross-compiled to aarch64-pc-windows-msvc and executed on a real ARM64 Windows
# machine, the archived suite runs green (2924/2924, validated locally). One packaging test,
# package_identity::cargo_install_exposes_only_pointbreak_executable, intentionally builds
# the crate via `cargo install` — the sole exception to the no-build premise (~2-3 min).
#
# Still report-only (continue-on-error) until this is confirmed green on the actual x86_64
# windows-latest runner a few times: an x64 run may surface genuine platform byte/behaviour
# differences the arm64 validation did not. Promote to gating (and to pull_request) once
# it is stably green.

on:
  workflow_dispatch:
  push:
    # Spike branch only, to avoid spending Windows minutes on every PR. Promote to
    # pull_request (or delete) once the lane is stably green on x64 and can gate.
    branches: [chore/remove-rustup]

permissions:
  contents: read

concurrency:
  group: ci-nix-windows-spike-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  cross-archive:
    name: cross-compile nextest archive (ubuntu → msvc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-wincross-${{ hashFiles('flake.lock', 'Cargo.lock') }}
          restore-prefixes-first-match: nix-wincross-
      # cargo-xwin fetches the MSVC CRT/SDK here (network is available in the step);
      # XWIN_ACCEPT_LICENSE is set inside the windows-cross dev shell.
      - name: cross-compile x86_64-pc-windows-msvc nextest archive
        run: nix develop .#windows-cross --command just windows-cross-archive x86_64-pc-windows-msvc
      - uses: actions/upload-artifact@v4
        with:
          name: nextest-archive-x86_64-pc-windows-msvc
          path: target/nextest/pointbreak-x86_64-pc-windows-msvc.tar.zst
          if-no-files-found: error
          retention-days: 3

  windows-run:
    name: run archive on Windows (x64, no suite build)
    needs: cross-archive
    runs-on: windows-latest
    # Report-only until confirmed stably green on this x64 runner — see header.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@nextest
      - uses: actions/download-artifact@v4
        with:
          name: nextest-archive-x86_64-pc-windows-msvc
          path: archive
      # No Rust build of the suite: nextest runs the prebuilt binaries from the archive.
      # --workspace-remap points the (runtime-resolved) fixture and binary lookups at this
      # checkout. The lone exception is the cargo_install packaging test, which builds the
      # crate on the runner by design (see header).
      - name: run archived suite (report-only)
        shell: bash
        run: |
          cargo nextest run \
            --archive-file archive/pointbreak-x86_64-pc-windows-msvc.tar.zst \
            --workspace-remap . \
            --no-fail-fast
