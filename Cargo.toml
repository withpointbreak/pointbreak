[package]
name = "shoreline"
version = "0.1.0"
edition = "2024"

[lib]
name = "shoreline"
path = "src/lib.rs"

[[bin]]
name = "shore"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
crossterm = "0.29"
ratatui = { version = "0.30.0", default-features = false, features = ["std", "crossterm"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
thiserror = "1"
tracing = { version = "0.1", default-features = false, features = ["std"] }
tracing-subscriber = { version = "0.3", default-features = false, features = ["ansi", "env-filter", "fmt", "json", "registry", "std"] }

[dev-dependencies]
ctor = "0.2"
tempfile = "3"
