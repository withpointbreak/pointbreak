[package]
name = "shoreline"
version = "0.1.0"
edition = "2024"
description = "Durable terminal code review for changes humans and coding agents collaborate on together"
rust-version = "1.95"
license = "Apache-2.0"
authors = ["Kevin Swiber <kevin@swiber.dev>"]
homepage = "https://github.com/kevinswiber/shoreline"
repository = "https://github.com/kevinswiber/shoreline"
documentation = "https://docs.rs/shoreline"
readme = "README.md"
keywords = ["code-review", "review", "terminal", "cli"]
categories = ["command-line-utilities", "development-tools"]
exclude = [
    ".claude/**",
    ".codex/**",
    ".github/**",
    "AGENTS.md",
    "CLAUDE.md",
    "mise.toml",
    "scripts/**",
]

[lib]
name = "shoreline"
path = "src/lib.rs"

[[bin]]
name = "shore"
path = "src/main.rs"

[[bench]]
name = "store_backend"
harness = false
required-features = ["bench"]

[features]
# Exposes the developer-run `bench_support` harness to the `store_backend`
# benchmark crate. Off by default and never enabled in a release build, so the
# harness stays out of the published surface.
bench = []

[dependencies]
clap = { version = "4", features = ["derive"] }
crossterm = "0.29"
base64 = "0.22"
bs58 = "0.5"
ed25519-dalek = "2"
getrandom = "0.4"
ratatui = { version = "0.30.0", default-features = false, features = ["std", "crossterm"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
thiserror = "1"
tracing = { version = "0.1", default-features = false, features = ["std"] }
tracing-subscriber = { version = "0.3", default-features = false, features = ["ansi", "env-filter", "fmt", "json", "registry", "std"] }

[dev-dependencies]
base64 = "0.22"
criterion = { version = "0.8", default-features = false, features = ["cargo_bench_support"] }
ctor = "0.2"
ed25519-dalek = "2"
sha2 = "0.10"
tempfile = "3"
